  <div class="app">
    <canvas id="scene"></canvas>
    <aside>
      <h1>HOME 初始狀態紀念模型 v0.2.1</h1>
      <p>預設先用俯視校對模式看全屋關係；需要空間感時再切到 3D 外殼或細節 cue。這是紀念/回看用模型，不是施工圖。</p>
      <div class="controls">

        <label><input id="showMarkers" type="checkbox" checked> 門 / 窗標記</label>
        <label><input id="showLabels" type="checkbox" checked> 房間標籤</label>
        <button id="planView">俯視校對</button>
        <button id="shellView">3D 外殼</button>
        <button id="detailView">細節 cue</button>
        <button id="resetView">重置</button>
      </div>

: [4.5149, 8.1026, 2.62], "size": [1.4978, 0.1712, 0.22], "material": "beam"}], "materials": {"entry_tile": {"name": "entry_tile", "rgb": [0.68, 0.66, 0.6], "alpha": 1.0}, "wet_tile": {"name": "wet_tile", "rgb": [0.55, 0.59, 0.62], "alpha": 1.0}, "balcony_tile": {"name": "balcony_tile", "rgb": [0.45, 0.47, 0.45], "alpha": 1.0}, "wood_or_dry": {"name": "wood_or_dry", "rgb": [0.77, 0.68, 0.55], "alpha": 1.0}, "wall": {"name": "wall", "rgb": [0.86, 0.84, 0.78], "alpha": 0.52}, "door_marker": {"name": "door_marker", "rgb": [0.05, 0.25, 0.55], "alpha": 1.0}, "window_marker": {"name": "window_marker", "rgb": [0.2, 0.7, 0.85], "alpha": 1.0}, "beam": {"name": "beam", "rgb": [0.5, 0.5, 0.48], "alpha": 1.0}, "fixture_wet": {"name": "fixture_wet", "rgb": [0.86, 0.88, 0.86], "alpha": 1.0}, "feature_dark": {"name": "feature_dark", "rgb": [0.25, 0.22, 0.18], "alpha": 1.0}, "glass_cue": {"name": "glass_cue", "rgb": [0.6, 0.8, 0.9], "alpha": 0.5}, "niche_marker": {"name": "niche_marker", "rgb": [0.82, 0.62, 0.32], "alpha": 0.72}}, "source_files": ["space_understanding/07_reports/space_memory.md", "space_understanding/07_reports/current_layout_v0.md", "space_understanding/07_reports/space_model_v1.md", "space_understanding/07_reports/measurement_area_baseline_2026-07-07.md", "tmp/pdfs/home-renovation/plan-1.png", "space_understanding/01_sources/measurement_2026-07-06_redline_render.png", "space_understanding/02_manifests/room_summary.json", "space_understanding/02_manifests/media_inventory.csv"]}</script>
  <script>
    const model = JSON.parse(document.getElementById('model-data').textContent);
    const canvas = document.getElementById('scene');
    const ctx = canvas.getContext('2d');
    const controls = {
      walls: document.getElementById('showWalls'),
      features: document.getElementById('showFeatures'),
      markers: document.getElementById('showMarkers'),
      labels: document.getElementById('showLabels')
    };
    let angle = 0;
    let tilt = 1;
    let zoom = 72;
    let minZoom = 24;
    let maxZoom = 220;
    let panX = 0;
    let panY = 0;
    let fitted = false;
    const activePointers = new Map();
    let lastPointerX = 0;
    let lastPointerY = 0;
    let lastPinchDistance = 0;
    let lastPointerCenter = null;

    function modelBounds2D() {
      const xs = [];
      const ys = [];
      for (const room of model.rooms) {
        for (const [x, y] of room.polygon) {
          xs.push(x);
          ys.push(y);
        }
      }
      return {
        minX: Math.min(...xs),
        maxX: Math.max(...xs),
        minY: Math.min(...ys),
        maxY: Math.max(...ys),
        centerX: (Math.min(...xs) + Math.max(...xs)) / 2,
        centerY: (Math.min(...ys) + Math.max(...ys)) / 2
      };
    }
    const modelBounds = modelBounds2D();

    function allFitPoints() {
      const points = [];
      for (const room of model.rooms) {
        for (const [x, y] of room.polygon) {
          points.push([x, y, 0]);
          points.push([x, y, model.height_m]);
        }
      }
      for (const box of model.feature_boxes) {
        const [cx, cy, cz] = box.center;
        const [sx, sy, sz] = box.size;
        for (const dx of [-0.5, 0.5]) for (const dy of [-0.5, 0.5]) for (const dz of [-0.5, 0.5]) {
          points.push([cx + sx * dx, cy + sy * dy, cz + sz * dz]);
        }
      }
      return points;
    }
    const fitPoints = allFitPoints();

    function rawProject(p) {
      const [x, y, z] = p;
      const lx = x - modelBounds.centerX;
      const ly = y - modelBounds.centerY;
      const cx = Math.cos(angle), sx = Math.sin(angle);
      const rx = lx * cx - ly * sx;
      const ry = lx * sx + ly * cx;
      return { x: rx, y: -ry * tilt - z, depth: ry + z * 0.32 };
    }

    function rawBounds() {
      const projected = fitPoints.map(rawProject);
      const xs = projected.map(p => p.x);
      const ys = projected.map(p => p.y);
      return {
        minX: Math.min(...xs),
        maxX: Math.max(...xs),
        minY: Math.min(...ys),
        maxY: Math.max(...ys)
      };
    }

    function fitView() {
      const rect = canvas.getBoundingClientRect();
      const bounds = rawBounds();
      const spanX = Math.max(1, bounds.maxX - bounds.minX);
      const spanY = Math.max(1, bounds.maxY - bounds.minY);
      const target = Math.min((rect.width * 0.82) / spanX, (rect.height * 0.76) / spanY);
      zoom = Math.max(16, Math.min(95, target));
      minZoom = Math.max(8, zoom * 0.35);
      maxZoom = Math.max(120, zoom * 4.5);
      panX = -((bounds.minX + bounds.maxX) / 2) * zoom;
      panY = -((bounds.minY + bounds.maxY) / 2) * zoom;
      fitted = true;
    }

    function clampZoom(value) {
      return Math.max(minZoom, Math.min(maxZoom, value));
    }

    function resize() {
      const rect = canvas.getBoundingClientRect();
      const dpr = window.devicePixelRatio || 1;
      canvas.width = Math.max(1, Math.floor(rect.width * dpr));
      canvas.height = Math.max(1, Math.floor(rect.height * dpr));
      ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
      if (!fitted) fitView();
      draw();
    }

    function color(name, alphaOverride) {
      const mat = model.materials[name] || model.materials.wall;
      const [r, g, b] = mat.rgb.map(v => Math.round(v * 255));
      const a = alphaOverride ?? mat.alpha ?? 1;
      return `rgba(${r}, ${g}, ${b}, ${a})`;
    }

    function project(p) {
      const raw = rawProject(p);
      const rect = canvas.getBoundingClientRect();
      return {
        x: rect.width / 2 + panX + raw.x * zoom,
        y: rect.height / 2 + panY + raw.y * zoom,
        depth: raw.depth
      };
    }

    function centroid(poly) {
      let x = 0, y = 0;
      for (const p of poly) { x += p[0]; y += p[1]; }
      return [x / poly.length, y / poly.length];
    }

    function boxFaces(box) {
      const [cx, cy, cz] = box.center;
      const [sx, sy, sz] = box.size;
      const c = {
        a:[cx-sx/2,cy-sy/2,cz-sz/2], b:[cx+sx/2,cy-sy/2,cz-sz/2],
        c:[cx+sx/2,cy+sy/2,cz-sz/2], d:[cx-sx/2,cy+sy/2,cz-sz/2],
        e:[cx-sx/2,cy-sy/2,cz+sz/2], f:[cx+sx/2,cy-sy/2,cz+sz/2],
        g:[cx+sx/2,cy+sy/2,cz+sz/2], h:[cx-sx/2,cy+sy/2,cz+sz/2]
      };
      return [
        [c.a,c.b,c.c,c.d],[c.e,c.h,c.g,c.f],[c.a,c.e,c.f,c.b],
        [c.b,c.f,c.g,c.c],[c.c,c.g,c.h,c.d],[c.d,c.h,c.e,c.a]
      ];
    }

    function buildFaces() {
      const faces = [];
      for (const room of model.rooms) {
        const floor = room.polygon.map(([x,y]) => [x,y,0]);
        faces.push({kind:'floor', material: room.floor_type, pts: floor, name: room.name});
        if (controls.walls.checked) {
          const poly = room.polygon;
          for (let i=0; i<poly.length; i++) {
            const p1 = poly[i], p2 = poly[(i+1)%poly.length];
            faces.push({kind:'wall', material:'wall', pts:[[p1[0],p1[1],0],[p2[0],p2[1],0],[p2[0],p2[1],model.height_m],[p1[0],p1[1],model.height_m]], name: room.id});
          }
        }
      }
      if (controls.markers.checked) {
        for (const door of model.doors) {
          faces.push(...boxFaces({center:[door.position[0],door.position[1],0.04], size:[0.7,0.18,0.08]}).map(pts => ({kind:'marker', material:'door_marker', pts, name:door.id})));
        }
        for (const win of model.windows) {
          const [[x1,y1],[x2,y2]] = win.segment;
          const box = {center:[(x1+x2)/2,(y1+y2)/2,1.15], size:[Math.max(Math.abs(x2-x1),0.08),Math.max(Math.abs(y2-y1),0.08),0.08]};
          faces.push(...boxFaces(box).map(pts => ({kind:'marker', material:'window_marker', pts, name:win.id})));
        }
      }
      if (controls.features.checked) {
        for (const box of model.feature_boxes) {
          faces.push(...boxFaces(box).map(pts => ({kind:'feature', material:box.material, pts, name:box.id})));
        }
      }
      return faces.map(face => {
        const projected = face.pts.map(project);
        return {...face, projected, depth: projected.reduce((s,p)=>s+p.depth,0)/projected.length};
      }).sort((a,b) => a.depth - b.depth);
    }

    function drawFace(face) {
      ctx.beginPath();
      face.projected.forEach((p, i) => i ? ctx.lineTo(p.x, p.y) : ctx.moveTo(p.x, p.y));
      ctx.closePath();
      ctx.fillStyle = color(face.material, face.kind === 'wall' ? 0.38 : undefined);
      ctx.strokeStyle = face.kind === 'floor' ? 'rgba(70,60,45,.22)' : 'rgba(50,45,35,.28)';
      ctx.lineWidth = face.kind === 'floor' ? 1 : 0.8;
      ctx.fill();
      ctx.stroke();
    }

    function drawLabels() {
      if (!controls.labels.checked) return;
      ctx.font = '13px -apple-system, BlinkMacSystemFont, "PingFang TC", sans-serif';
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      for (const room of model.rooms) {
        const [x,y] = room.centroid || centroid(room.polygon);
        const p = project([x,y,0.08]);
        ctx.fillStyle = 'rgba(255,252,244,.88)';
        const w = Math.max(54, ctx.measureText(room.name).width + 16);
        ctx.fillRect(p.x - w/2, p.y - 12, w, 24);
        ctx.strokeStyle = 'rgba(60,55,45,.25)';
        ctx.strokeRect(p.x - w/2, p.y - 12, w, 24);
        ctx.fillStyle = '#2f2a22';
        ctx.fillText(room.name, p.x, p.y);
      }
    }

    function draw() {
      const rect = canvas.getBoundingClientRect();
      ctx.clearRect(0,0,rect.width,rect.height);
      ctx.fillStyle = '#ebe5d9';
      ctx.fillRect(0,0,rect.width,rect.height);
      for (const face of buildFaces()) drawFace(face);
      drawLabels();
    }

    function pointerDistance() {
      const points = [...activePointers.values()];
      if (points.length < 2) return 0;
      const dx = points[0].x - points[1].x;
      const dy = points[0].y - points[1].y;
      return Math.hypot(dx, dy);
    }

    function pointerCenter() {
      const points = [...activePointers.values()];
      if (!points.length) return null;
      return {
        x: points.reduce((sum, p) => sum + p.x, 0) / points.length,
        y: points.reduce((sum, p) => sum + p.y, 0) / points.length
      };
    }

    canvas.addEventListener('pointerdown', e => {
      e.preventDefault();
      canvas.setPointerCapture?.(e.pointerId);
      activePointers.set(e.pointerId, {x: e.clientX, y: e.clientY});
      lastPointerX = e.clientX;
      lastPointerY = e.clientY;
      lastPointerCenter = pointerCenter();
      lastPinchDistance = pointerDistance();
    });
    canvas.addEventListener('pointermove', e => {
      if (!activePointers.has(e.pointerId)) return;
      e.preventDefault();
      activePointers.set(e.pointerId, {x: e.clientX, y: e.clientY});
      if (activePointers.size === 1) {
        angle += (e.clientX - lastPointerX) * 0.007;
        panY += (e.clientY - lastPointerY) * 0.45;
        lastPointerX = e.clientX;
        lastPointerY = e.clientY;
      } else {
        const center = pointerCenter();
        if (lastPointerCenter && center) {
          panX += center.x - lastPointerCenter.x;
          panY += center.y - lastPointerCenter.y;
        }
        const distance = pointerDistance();
        if (lastPinchDistance > 0 && distance > 0) {
          zoom = clampZoom(zoom * (distance / lastPinchDistance));
        }
        lastPinchDistance = distance;
        lastPointerCenter = center;
      }
      draw();
    });
    function endPointer(e) {
      activePointers.delete(e.pointerId);
      lastPinchDistance = pointerDistance();
      lastPointerCenter = pointerCenter();
      if (activePointers.size === 1) {
        const point = [...activePointers.values()][0];
        lastPointerX = point.x;
        lastPointerY = point.y;
      }
    }
    canvas.addEventListener('pointerup', endPointer);
    canvas.addEventListener('pointercancel', endPointer);
    canvas.addEventListener('pointerleave', endPointer);
    canvas.addEventListener('wheel', e => {
      e.preventDefault();
      zoom = clampZoom(zoom * (e.deltaY > 0 ? 0.92 : 1.08));
      draw();
    }, {passive:false});
    for (const input of Object.values(controls)) input.addEventListener('change', draw);
    function applyView(mode) {
      if (mode === 'plan') {
        angle = 0;
        tilt = 1;
        controls.walls.checked = false;
        controls.features.checked = false;
        controls.markers.checked = true;
        controls.labels.checked = true;
      } else if (mode === 'shell') {
        angle = -0.78;
        tilt = 0.58;
        controls.walls.checked = true;
        controls.features.checked = false;
        controls.markers.checked = true;
        controls.labels.checked = true;
      } else {
        angle = -0.78;
        tilt = 0.58;
        controls.walls.checked = true;
        controls.features.checked = true;
        controls.markers.checked = true;
        controls.labels.checked = true;
      }
      fitted = false;
      fitView();
      draw();
    }
    document.getElementById('planView').addEventListener('click', () => applyView('plan'));
    document.getElementById('shellView').addEventListener('click', () => applyView('shell'));
    document.getElementById('detailView').addEventListener('click', () => applyView('detail'));
    document.getElementById('resetView').addEventListener('click', () => applyView('plan'));

    const roomList = document.getElementById('roomList');
    for (const room of model.rooms) {
      const mat = model.materials[room.floor_type];
      const [r,g,b] = mat.rgb.map(v => Math.round(v*255));
      const row = document.createElement('div');
      row.className = 'room';
      row.innerHTML = `<span>${room.id}</span><span>${room.name}</span><span class="swatch" style="background: rgb(${r},${g},${b})"></span>`;
      roomList.appendChild(row);
    }
    window.addEventListener('resize', resize);
    resize();
  </script>
</body>
</html>
